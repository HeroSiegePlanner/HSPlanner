version: 2
updates:
  # Frontend (NPM)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      tauri-js:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
          - "globals"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      # Catch-all: everything ungrouped, minor/patch in one PR
      npm-misc:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Tauri backend (Rust)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      tauri-rs:
        patterns:
          - "tauri"
          - "tauri-build"
          - "tauri-plugin-*"
      specta:
        patterns:
          - "specta"
          - "specta-*"
          - "tauri-specta"
      serde:
        patterns:
          - "serde"
          - "serde_*"
      # Catch-all: everything ungrouped, minor/patch in one PR
      cargo-misc:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Bundle every GitHub Actions update (incl. major) into one PR
      actions:
        patterns:
          - "*"
